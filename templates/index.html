<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZZZ DISC SCORER · 绝区零驱动盘评分</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0F23;
    --card: #1A1A35;
    --card2: #27273B;
    --border: #4C1D95;
    --accent: #7C3AED;
    --accent2: #A78BFA;
    --cta: #F43F5E;
    --text: #E2E8F0;
    --text2: #94A3B8;
    --green: #10B981;
    --red: #EF4444;
    --yellow: #F59E0B;
    --radius: 8px;
    --glow: 0 0 12px rgba(124,58,237,0.5);
    --glow-cta: 0 0 16px rgba(244,63,94,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; min-height: 100vh; }

  header {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, #1a0a2e 0%, #0F0F23 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 20px rgba(124,58,237,0.3);
  }
  header::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  }
  header .logo {
    font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900;
    color: var(--accent2); letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(124,58,237,0.8), 0 0 20px rgba(124,58,237,0.4);
  }
  header .sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); letter-spacing: 1px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Character selector */
  .char-section {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; margin-bottom: 24px;
    box-shadow: var(--glow);
  }
  .char-section label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent2); display: block; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .char-section select {
    width: 100%; max-width: 320px; background: var(--card2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: var(--radius); font-size: 15px; cursor: pointer;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .char-section select:focus { border-color: var(--accent); box-shadow: var(--glow); }
  .char-info {
    margin-top: 14px; padding: 12px 16px; background: var(--card2); border-radius: var(--radius);
    border-left: 3px solid var(--accent); display: none;
  }
  .char-info.visible { display: block; }
  .char-info-grid { display: flex; flex-wrap: wrap; gap: 8px 24px; font-size: 13px; }
  .char-info-item { color: var(--text2); font-size: 12px; }
  .char-info-item span { color: var(--accent2); font-family: 'JetBrains Mono', monospace; }

  /* Disc grid */
  .discs-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;
  }
  @media (max-width: 700px) { .discs-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .discs-grid { grid-template-columns: 1fr; } }

  .disc-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
    transition: border-color .2s, box-shadow .2s;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
  }
  .disc-card:hover { border-color: var(--accent); box-shadow: var(--glow); }
  .disc-card.graded { border-color: var(--cta); box-shadow: var(--glow-cta); }

  .disc-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .disc-num {
    width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--cta));
    color: #fff; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-weight: 700; font-size: 13px; flex-shrink: 0;
    box-shadow: 0 0 8px rgba(124,58,237,0.6);
  }
  .disc-title { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent2); letter-spacing: 1px; }
  .disc-pos-hint { font-size: 11px; color: var(--text2); margin-left: auto; }

  /* OCR button and panel */
  .ocr-btn {
    margin-left: auto; background: transparent; border: 1px solid var(--border);
    color: var(--text2); width: 26px; height: 26px; border-radius: 4px; cursor: pointer;
    font-size: 13px; display: flex; align-items: center; justify-content: center;
    transition: border-color .2s, color .2s, box-shadow .2s; flex-shrink: 0;
  }
  .ocr-btn:hover { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 8px rgba(167,139,250,0.4); }
  .ocr-panel {
    display: none; margin-bottom: 12px; padding: 10px 12px;
    background: var(--card2); border-radius: var(--radius); border: 1px solid var(--border);
  }
  .ocr-panel.open { display: block; }
  .ocr-panel-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .ocr-file-input {
    flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--border);
    color: var(--text2); padding: 5px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
  }
  .ocr-file-input::file-selector-button {
    background: var(--card); border: 1px solid var(--border); color: var(--accent2);
    padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-right: 6px;
  }
  .ocr-go-btn {
    background: linear-gradient(135deg, var(--accent), var(--cta)); color: #fff;
    border: none; border-radius: 4px; padding: 5px 12px; font-size: 12px;
    font-family: 'JetBrains Mono', monospace; cursor: pointer; white-space: nowrap;
    transition: opacity .2s; flex-shrink: 0;
  }
  .ocr-go-btn:hover { opacity: .85; }
  .ocr-go-btn:disabled { opacity: .4; cursor: not-allowed; }
  .ocr-status { font-size: 11px; margin-top: 6px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }

  .field-group { margin-bottom: 10px; }
  .field-group label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text2); display: block; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }

  input[type="text"], select.field-select {
    width: 100%; background: var(--card2); border: 1px solid var(--border);
    color: var(--text); padding: 7px 10px; border-radius: var(--radius); font-size: 13px; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type="text"]:focus, select.field-select:focus { border-color: var(--accent); box-shadow: var(--glow); }
  input[type="text"]::placeholder { color: #555575; }

  .substat-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .substat-row select { flex: 2; }
  .substat-row input { flex: 1; min-width: 0; font-family: 'JetBrains Mono', monospace; }

  /* Datalist hint */
  .set-input-wrap { position: relative; }

  /* Score button */
  .score-btn {
    display: block; width: 100%; max-width: 400px; margin: 0 auto 32px;
    background: linear-gradient(135deg, var(--cta) 0%, #BE185D 100%);
    color: #fff; font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; padding: 14px;
    border: none; border-radius: var(--radius); cursor: pointer; letter-spacing: 2px;
    transition: opacity .2s, transform .1s, box-shadow .2s;
    box-shadow: var(--glow-cta);
  }
  .score-btn:hover { opacity: .9; box-shadow: 0 0 24px rgba(244,63,94,0.7); }
  .score-btn:active { transform: scale(.98); }
  .score-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

  /* Loading */
  .loading {
    text-align: center; padding: 40px; display: none;
  }
  .loading.visible { display: block; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 12px;
    box-shadow: 0 0 12px rgba(124,58,237,0.5);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results { display: none; }
  .results.visible { display: block; }

  .overall-card {
    background: linear-gradient(135deg, #1a0a2e 0%, #1A1A35 100%);
    border: 1px solid var(--accent); border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
    box-shadow: var(--glow);
  }
  .overall-top { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .grade-badge {
    width: 72px; height: 72px; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 30px; font-weight: 900; flex-shrink: 0;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  }
  .grade-S { background: linear-gradient(135deg,var(--cta),#BE185D); color: #fff; box-shadow: var(--glow-cta); }
  .grade-A { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; box-shadow: var(--glow); }
  .grade-B { background: linear-gradient(135deg,#10B981,#059669); color: #fff; }
  .grade-C { background: linear-gradient(135deg,#475569,#334155); color: #fff; }
  .grade-D { background: linear-gradient(135deg,var(--red),#991B1B); color: #fff; }

  .overall-info .score-num { font-family: 'Orbitron', monospace; font-size: 42px; font-weight: 900; color: var(--accent2); line-height: 1; text-shadow: 0 0 10px rgba(167,139,250,0.6); }
  .overall-info .score-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); margin-top: 2px; letter-spacing: 1px; }
  .overall-comment { margin-top: 14px; font-size: 14px; color: var(--text2); line-height: 1.7; }

  .discs-result-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;
  }
  @media (max-width: 700px) { .discs-result-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .discs-result-grid { grid-template-columns: 1fr; } }

  .disc-result-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  }
  .disc-result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .disc-result-grade {
    width: 32px; height: 32px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 800; flex-shrink: 0;
  }
  .disc-result-score { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 800; color: var(--accent2); }
  .disc-result-slot { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); letter-spacing: 1px; }
  .disc-result-stars { color: var(--yellow); font-size: 12px; margin-bottom: 6px; }
  .disc-result-line { font-size: 12px; color: var(--text2); margin-bottom: 4px; line-height: 1.5; }
  .disc-result-line span { color: var(--text); }
  .effective-bar { display: flex; gap: 3px; margin-top: 8px; }
  .eff-dot { width: 18px; height: 5px; border-radius: 2px; background: var(--card2); border: 1px solid var(--border); }
  .eff-dot.active { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px rgba(16,185,129,0.6); }

  .suggestions-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--glow);
  }
  .suggestions-card h3 { font-family: 'Orbitron', monospace; font-size: 13px; color: var(--accent2); margin-bottom: 14px; letter-spacing: 2px; }
  .suggestion-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; font-size: 13px; }
  .suggestion-icon { color: var(--cta); flex-shrink: 0; font-size: 15px; }
  .priority-box {
    margin-top: 14px; padding: 10px 14px; background: var(--card2); border-radius: var(--radius);
    border-left: 3px solid var(--cta); font-size: 13px;
  }
  .priority-box .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text2); margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }

  .error-box {
    background: rgba(239,68,68,0.1); border: 1px solid var(--red); border-radius: var(--radius);
    padding: 16px 20px; color: var(--red); font-size: 14px; display: none;
  }
  .error-box.visible { display: block; }

  /* Settings button */
  .settings-btn {
    margin-left: auto; background: transparent; border: 1px solid var(--border);
    color: var(--text2); padding: 7px 12px; border-radius: var(--radius); cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    transition: border-color .2s, color .2s, box-shadow .2s;
  }
  .settings-btn:hover { border-color: var(--accent); color: var(--accent2); box-shadow: var(--glow); }

  /* Settings modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100;
    display: none; align-items: center; justify-content: center; padding: 16px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--accent); border-radius: var(--radius);
    padding: 24px; width: 100%; max-width: 480px; box-shadow: var(--glow);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; color: var(--accent2); letter-spacing: 2px; }
  .modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; transition: color .2s; }
  .modal-close:hover { color: var(--cta); }

  .setting-field { margin-bottom: 16px; }
  .setting-field label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text2); display: block; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .setting-field input, .setting-field select {
    width: 100%; background: var(--card2); border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; border-radius: var(--radius); font-size: 13px; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .setting-field input:focus, .setting-field select:focus { border-color: var(--accent); box-shadow: var(--glow); }
  .setting-field input::placeholder { color: #55556a; }

  .setting-hint { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.5; }
  .setting-hint a { color: var(--accent2); text-decoration: none; }

  .provider-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .ptab {
    flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--card2); color: var(--text2); cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    text-align: center; transition: all .15s;
  }
  .ptab.active { border-color: var(--accent); color: var(--accent2); background: rgba(124,58,237,0.15); box-shadow: var(--glow); }

  .modal-save-btn {
    width: 100%; padding: 11px;
    background: linear-gradient(135deg, var(--cta), #BE185D);
    color: #fff; font-family: 'Orbitron', monospace; font-weight: 700; border: none;
    border-radius: var(--radius); cursor: pointer; font-size: 13px; margin-top: 4px;
    letter-spacing: 1px; transition: opacity .2s, box-shadow .2s;
    box-shadow: var(--glow-cta);
  }
  .modal-save-btn:hover { opacity: .9; }

  .api-status {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-top: 6px;
    padding: 6px 10px; border-radius: var(--radius); background: var(--card2); color: var(--text2);
  }
  .api-status.set { color: var(--green); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">▶ ZZZ DISC SCORER</div>
    <div class="sub">DRIVE DISC ANALYZER · AI SCORING SYSTEM</div>
  </div>
  <button class="settings-btn" onclick="openSettings()" title="API 设置">⚙ CONFIG</button>
</header>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚙ API CONFIG</div>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>

    <div class="provider-tabs">
      <div class="ptab active" id="tab-openai" onclick="switchProvider('openai')">OpenAI</div>
      <div class="ptab" id="tab-claude" onclick="switchProvider('claude')">Claude</div>
      <div class="ptab" id="tab-deepseek" onclick="switchProvider('deepseek')">DeepSeek</div>
      <div class="ptab" id="tab-custom" onclick="switchProvider('custom')">自定义</div>
    </div>

    <div class="setting-field">
      <label>API Key</label>
      <input type="password" id="cfg_api_key" placeholder="sk-...">
      <div class="setting-hint" id="cfg_key_hint">OpenAI API Key，从 platform.openai.com 获取</div>
    </div>

    <div class="setting-field" id="cfg_base_wrap">
      <label>API Base URL（可选）</label>
      <input type="text" id="cfg_api_base" placeholder="https://api.openai.com">
      <div class="setting-hint">留空使用默认地址；使用国内代理或第三方转发时填写</div>
    </div>

    <div class="setting-field" id="cfg_model_wrap">
      <label>模型名称（可选）</label>
      <input type="text" id="cfg_model" placeholder="">
      <div class="setting-hint" id="cfg_model_hint">留空使用默认模型</div>
    </div>

    <div class="api-status" id="apiStatus">未配置 API Key</div>

    <button class="modal-save-btn" onclick="saveSettings()">保存设置</button>
  </div>
</div>

<div class="container">

  <!-- Character Select -->
  <div class="char-section">
    <label>选择角色</label>
    <select id="charSelect">
      <option value="">-- 请选择角色 --</option>
    </select>
    <div class="char-info" id="charInfo">
      <div class="char-info-grid" id="charInfoGrid"></div>
    </div>
  </div>

  <!-- 6 Disc Cards -->
  <div class="discs-grid" id="discsGrid"></div>

  <!-- Score Button -->
  <button class="score-btn" id="scoreBtn" onclick="submitScore()">▶ AI SCORING ANALYSIS</button>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:1px;">ANALYZING DISC DATA…</div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div class="results" id="results"></div>

</div>

<!-- Datalists -->
<datalist id="setList"></datalist>

<script>
let charData = null;
let selectedChar = null;

const SLOT_LABELS = ["","生命","攻击","防御","暴击/穿透","输出","伤害/能量"];

// 主属性 → 需要从副属性列表排除的词条（同类型不能同时出现）
const MAIN_SUBSTAT_EXCLUDE = {
  "生命值":        ["生命值%", "生命值数值"],
  "攻击力":        ["攻击力%", "攻击力数值"],
  "防御力":        ["防御力%", "防御力数值"],
  "生命值%":       ["生命值%", "生命值数值"],
  "攻击力%":       ["攻击力%", "攻击力数值"],
  "防御力%":       ["防御力%", "防御力数值"],
  "暴击率%":       ["暴击率%"],
  "暴击伤害%":     ["暴击伤害%"],
  "异常精通":      ["异常精通"],
};

function refreshSubstatOptions(slot) {
  if (slot <= 3) return; // slots 1-3 have fixed main stats; no exclusion needed
  const mainEl = document.getElementById(`disc${slot}_main`);
  const mainStat = mainEl ? mainEl.value : "";
  const excluded = MAIN_SUBSTAT_EXCLUDE[mainStat] || [];
  for (let j = 1; j <= 4; j++) {
    const sel = document.getElementById(`disc${slot}_sub${j}_name`);
    if (!sel) continue;
    Array.from(sel.options).forEach(opt => {
      if (!opt.value) return;
      opt.disabled = excluded.includes(opt.value);
      opt.hidden   = excluded.includes(opt.value);
    });
    if (excluded.includes(sel.value)) sel.value = "";
  }
}

// ── Settings ──────────────────────────────────────────────
const PROVIDER_DEFAULTS = {
  openai:   { hint: "OpenAI API Key，从 platform.openai.com 获取", model: "gpt-4o-mini", base: "https://api.openai.com" },
  claude:   { hint: "Anthropic API Key，从 console.anthropic.com 获取", model: "claude-haiku-4-5-20251001", base: "https://api.anthropic.com" },
  deepseek: { hint: "DeepSeek API Key，从 platform.deepseek.com 获取", model: "deepseek-chat", base: "https://api.deepseek.com" },
  custom:   { hint: "兼容 OpenAI 格式的第三方 API Key", model: "", base: "" }
};

function loadSettings() {
  return JSON.parse(localStorage.getItem("zzz_api_settings") || "{}");
}

function saveSettings() {
  const provider = document.querySelector(".ptab.active").id.replace("tab-", "");
  const settings = {
    provider,
    api_key: document.getElementById("cfg_api_key").value.trim(),
    api_base: document.getElementById("cfg_api_base").value.trim(),
    model: document.getElementById("cfg_model").value.trim()
  };
  localStorage.setItem("zzz_api_settings", JSON.stringify(settings));
  updateApiStatus(settings);
  closeSettings();
}

function openSettings() {
  const s = loadSettings();
  const provider = s.provider || "openai";
  switchProvider(provider);
  document.getElementById("cfg_api_key").value = s.api_key || "";
  document.getElementById("cfg_api_base").value = s.api_base || "";
  document.getElementById("cfg_model").value = s.model || "";
  document.getElementById("settingsModal").classList.add("visible");
}

function closeSettings() {
  document.getElementById("settingsModal").classList.remove("visible");
}

function switchProvider(p) {
  document.querySelectorAll(".ptab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + p).classList.add("active");
  const d = PROVIDER_DEFAULTS[p];
  document.getElementById("cfg_key_hint").textContent = d.hint;
  document.getElementById("cfg_model").placeholder = d.model || "（默认）";
  document.getElementById("cfg_api_base").placeholder = d.base || "https://your-api.example.com";
  // show/hide base url for non-openai
  document.getElementById("cfg_base_wrap").style.display = p === "claude" ? "none" : "block";
  if (p === "claude") document.getElementById("cfg_api_base").value = "";
}

function updateApiStatus(settings) {
  const el = document.getElementById("apiStatus");
  if (!settings || !settings.api_key) {
    el.textContent = "未配置 API Key（将尝试使用服务器环境变量）";
    el.className = "api-status";
  } else {
    const masked = settings.api_key.slice(0, 6) + "…" + settings.api_key.slice(-4);
    el.textContent = `✓ 已配置 ${(settings.provider||"openai").toUpperCase()} Key: ${masked}`;
    el.className = "api-status set";
  }
}

// Close modal on overlay click
document.getElementById("settingsModal").addEventListener("click", function(e) {
  if (e.target === this) closeSettings();
});

// Init settings status
updateApiStatus(loadSettings());
// ──────────────────────────────────────────────────────────

function toggleOcr(slot) {
  const panel = document.getElementById(`disc${slot}_ocr_panel`);
  panel.classList.toggle('open');
}

async function ocrDisc(slot) {
  const fileInput = document.getElementById(`disc${slot}_ocr_file`);
  const statusEl = document.getElementById(`disc${slot}_ocr_status`);
  const btn = document.getElementById(`disc${slot}_ocr_btn`);
  const file = fileInput.files[0];
  if (!file) { statusEl.style.color = 'var(--red)'; statusEl.textContent = '请先选择图片'; return; }

  statusEl.style.color = 'var(--text2)';
  statusEl.textContent = '识别中…';
  btn.disabled = true;

  const reader = new FileReader();
  reader.onload = async function(e) {
    const dataUrl = e.target.result;
    const comma = dataUrl.indexOf(',');
    const b64 = dataUrl.slice(comma + 1);
    const mime = file.type || 'image/png';

    const cfg = loadSettings();
    try {
      const res = await fetch('/api/ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: b64, mime_type: mime,
          provider: cfg.provider || '',
          api_key: cfg.api_key || '',
          api_base: cfg.api_base || '',
          model: cfg.model || ''
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      if (data.set_name) document.getElementById(`disc${slot}_set`).value = data.set_name;
      if (data.main_stat) {
        const mainEl = document.getElementById(`disc${slot}_main`);
        if (mainEl) {
          mainEl.value = data.main_stat;
          mainEl.dispatchEvent(new Event('change'));
        }
      }
      (data.substats || []).forEach((sub, i) => {
        const n = i + 1;
        if (n > 4) return;
        const nameEl = document.getElementById(`disc${slot}_sub${n}_name`);
        const valEl = document.getElementById(`disc${slot}_sub${n}_val`);
        if (nameEl && sub.name) nameEl.value = sub.name;
        if (valEl && sub.value) valEl.value = sub.value;
      });

      statusEl.style.color = 'var(--green)';
      statusEl.textContent = '✓ 识别成功';
    } catch(err) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = '✗ ' + err.message;
    } finally {
      btn.disabled = false;
    }
  };
  reader.readAsDataURL(file);
}

async function init() {
  const res = await fetch("/api/characters");
  charData = await res.json();

  // Populate character select
  const sel = document.getElementById("charSelect");
  charData.characters.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.name;
    opt.textContent = `${c.name}（${c.role} · ${c.element}）`;
    sel.appendChild(opt);
  });

  // Populate set datalist
  const dl = document.getElementById("setList");
  charData.sets.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s;
    dl.appendChild(opt);
  });

  buildDiscCards();
}

function buildDiscCards() {
  const grid = document.getElementById("discsGrid");
  grid.innerHTML = "";
  for (let i = 1; i <= 6; i++) {
    grid.appendChild(buildDiscCard(i));
    refreshSubstatOptions(i);
  }
}

function buildDiscCard(slot) {
  const card = document.createElement("div");
  card.className = "disc-card";
  card.id = `disc-${slot}`;

  const mainOptions = (charData.main_stats_by_slot[String(slot)] || [])
    .map(s => `<option value="${s}">${s}</option>`).join("");

  const substatOptions = charData.substats
    .map(s => `<option value="${s}">${s}</option>`).join("");

  let subRows = "";
  for (let j = 1; j <= 4; j++) {
    subRows += `
      <div class="substat-row">
        <select class="field-select" id="disc${slot}_sub${j}_name">
          <option value="">副属性${j}</option>
          ${substatOptions}
        </select>
        <input type="text" id="disc${slot}_sub${j}_val" placeholder="数值">
      </div>`;
  }

  const isFixed = slot <= 3;
  const mainFixed = {1:"生命值", 2:"攻击力", 3:"防御力"}[slot] || "";

  card.innerHTML = `
    <div class="disc-header">
      <div class="disc-num">${slot}</div>
      <div>
        <div class="disc-title">DISC-0${slot}</div>
        <div style="font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;letter-spacing:1px">${SLOT_LABELS[slot].toUpperCase()}</div>
      </div>
      <button class="ocr-btn" onclick="toggleOcr(${slot})" title="截图识别">📷</button>
    </div>
    <div class="ocr-panel" id="disc${slot}_ocr_panel">
      <div class="ocr-panel-row">
        <input type="file" class="ocr-file-input" id="disc${slot}_ocr_file" accept="image/*">
        <button class="ocr-go-btn" id="disc${slot}_ocr_btn" onclick="ocrDisc(${slot})">识别</button>
      </div>
      <div class="ocr-status" id="disc${slot}_ocr_status"></div>
    </div>
    <div class="field-group">
      <label>套装名称</label>
      <input type="text" id="disc${slot}_set" list="setList" placeholder="输入或选择套装…">
    </div>
    <div class="field-group">
      <label>主属性</label>
      ${isFixed
        ? `<input type="text" id="disc${slot}_main" value="${mainFixed}" readonly style="opacity:.6;cursor:default">`
        : `<select class="field-select" id="disc${slot}_main" onchange="refreshSubstatOptions(${slot})"><option value="">选择主属性</option>${mainOptions}</select>`
      }
    </div>
    <div class="field-group">
      <label>副属性（最多4条）</label>
      ${subRows}
    </div>`;
  return card;
}

document.getElementById("charSelect").addEventListener("change", function() {
  const name = this.value;
  if (!name || !charData) {
    selectedChar = null;
    document.getElementById("charInfo").classList.remove("visible");
    return;
  }
  selectedChar = charData.characters.find(c => c.name === name);
  if (!selectedChar) return;

  const grid = document.getElementById("charInfoGrid");
  grid.innerHTML = `
    <div class="char-info-item">定位：<span>${selectedChar.role}</span></div>
    <div class="char-info-item">属性：<span>${selectedChar.element}</span></div>
    <div class="char-info-item">推荐套装：<span>${selectedChar.recommended_sets.join(" / ")}</span></div>
    <div class="char-info-item">优先副属性：<span>${selectedChar.priority_substats.join("、")}</span></div>
    <div class="char-info-item" style="flex:1 1 100%">备注：<span>${selectedChar.substat_notes}</span></div>
  `;
  document.getElementById("charInfo").classList.add("visible");
});

function collectDiscs() {
  const discs = [];
  for (let i = 1; i <= 6; i++) {
    const setEl = document.getElementById(`disc${i}_set`);
    const mainEl = document.getElementById(`disc${i}_main`);
    const substats = [];
    for (let j = 1; j <= 4; j++) {
      const name = document.getElementById(`disc${i}_sub${j}_name`).value;
      const value = document.getElementById(`disc${i}_sub${j}_val`).value.trim();
      if (name && value) substats.push({ name, value });
    }
    discs.push({
      slot: i,
      set_name: setEl ? setEl.value.trim() : "",
      main_stat: mainEl ? mainEl.value : "",
      substats
    });
  }
  return discs;
}

async function submitScore() {
  const charName = document.getElementById("charSelect").value;
  if (!charName) { alert("请先选择角色"); return; }

  const discs = collectDiscs();
  const emptyDiscs = discs.filter(d => !d.set_name && !d.main_stat && d.substats.length === 0);
  if (emptyDiscs.length === 6) { alert("请至少填写一个驱动盘的信息"); return; }

  document.getElementById("results").classList.remove("visible");
  document.getElementById("errorBox").classList.remove("visible");
  document.getElementById("loading").classList.add("visible");
  document.getElementById("scoreBtn").disabled = true;

  const cfg = loadSettings();
  try {
    const res = await fetch("/api/score", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        character: charName,
        discs,
        provider: cfg.provider || "",
        api_key: cfg.api_key || "",
        api_base: cfg.api_base || "",
        model: cfg.model || ""
      })
    });
    const data = await res.json();
    document.getElementById("loading").classList.remove("visible");
    if (data.error) {
      showError(data.error);
    } else {
      renderResults(data);
    }
  } catch(e) {
    document.getElementById("loading").classList.remove("visible");
    showError("网络请求失败：" + e.message);
  } finally {
    document.getElementById("scoreBtn").disabled = false;
  }
}

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.textContent = "❌ " + msg;
  box.classList.add("visible");
}

function gradeColor(g) {
  return { S:"grade-S", A:"grade-A", B:"grade-B", C:"grade-C", D:"grade-D" }[g] || "grade-C";
}

function scoreToGrade(s) {
  if (s >= 90) return "S";
  if (s >= 75) return "A";
  if (s >= 60) return "B";
  if (s >= 40) return "C";
  return "D";
}

function renderResults(data) {
  const el = document.getElementById("results");
  const grade = data.overall_grade || scoreToGrade(data.overall_score);

  let discCards = "";
  (data.discs || []).forEach(d => {
    const dg = d.grade || scoreToGrade(d.score);
    const eff = d.effective_substats || 0;
    let dots = "";
    for (let i = 0; i < 4; i++) dots += `<div class="eff-dot${i < eff ? " active" : ""}"></div>`;

    discCards += `
    <div class="disc-result-card">
      <div class="disc-result-header">
        <div class="disc-result-grade ${gradeColor(dg)}">${dg}</div>
        <div>
          <div class="disc-result-score">${d.score}</div>
          <div class="disc-result-slot">${d.slot}号位</div>
        </div>
      </div>
      <div class="disc-result-line">套装：<span>${d.set_eval || "—"}</span></div>
      <div class="disc-result-line">主属性：<span>${d.main_stat_eval || "—"}</span></div>
      <div class="disc-result-line">副属性：<span>${d.substat_eval || "—"}</span></div>
      <div class="disc-result-line">${d.comment || ""}</div>
      <div class="effective-bar" title="有效词条数">${dots}</div>
    </div>`;
  });

  const suggestions = (data.suggestions || []).map(s =>
    `<div class="suggestion-item"><span class="suggestion-icon">◆</span><span>${s}</span></div>`
  ).join("");

  el.innerHTML = `
    <div class="overall-card">
      <div class="overall-top">
        <div class="grade-badge ${gradeColor(grade)}">${grade}</div>
        <div class="overall-info">
          <div class="score-num">${data.overall_score}</div>
          <div class="score-label">综合评分 / 100</div>
        </div>
        ${data.meta_tier ? `<div style="margin-left:auto;background:var(--card2);border:1px solid var(--accent);border-radius:8px;padding:6px 14px;text-align:center;box-shadow:var(--glow)"><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:1px">META TIER</div><div style="font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--accent2)">${data.meta_tier}</div></div>` : ""}
      </div>
      <div class="overall-comment">${data.overall_comment || ""}</div>
      ${data.set_synergy ? `<div style="margin-top:10px;padding:10px 14px;background:var(--card2);border-radius:8px;border-left:3px solid var(--accent2);font-size:13px;color:var(--text2)"><span style="color:var(--accent2);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px">SET SYNERGY：</span>${data.set_synergy}</div>` : ""}
    </div>

    <div class="discs-result-grid">${discCards}</div>

    <div class="suggestions-card">
      <h3>◈ 优化建议</h3>
      ${suggestions}
      ${data.priority_upgrades ? `
      <div class="priority-box">
        <div class="label">🔥 优先处理</div>
        ${data.priority_upgrades}
      </div>` : ""}
    </div>
  `;

  el.classList.add("visible");
  el.scrollIntoView({ behavior: "smooth", block: "start" });
}

init();
</script>
